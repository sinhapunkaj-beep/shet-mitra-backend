<!DOCTYPE html>
<html>
<head>
    <title>Shet Mitra Report</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; }

        .container {
            width: 420px;
            margin: auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .header {
            background: #1b5e20;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .section { padding: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .box { height: 60px; border-radius: 5px; }

        .green { background: #2e7d32; }
        .lightgreen { background: #66bb6a; }
        .yellow { background: #fdd835; }
        .orange { background: #fb8c00; }
        .red { background: #e53935; }

        .legend {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 10px;
        }

        .weather-box {
            background: linear-gradient(180deg, #a7c7e7, #90caf9);
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            text-align: center;
            font-size: 13px;
        }

        .green-text { color: green; font-weight: bold; }
        .red-text { color: red; font-weight: bold; }
        .orange-text { color: orange; font-weight: bold; }

        .advisory-box {
            background: #fff3e0;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            font-weight: bold;
            white-space: pre-line;
            border-left: 6px solid #ff9800;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h3>Shet Mitra</h3>
        <p>Sahyadri Krushi Intelligence</p>
        <p>{{date}}</p>
    </div>

    <div class="section">

        <!-- GRID -->
        <div class="grid">
            {% for row in grid %}
                {% for cell in row %}
                    <div class="box {{cell}}"></div>
                {% endfor %}
            {% endfor %}
        </div>

        <!-- LEGEND -->
        <div class="legend">
            🟢 Green → Healthy  
            🟡 Yellow → Monitor  
            🟠 Orange → Moderate  
            🔴 Red → Critical
        </div>

        <!-- WEATHER -->
        <div class="weather-box">
            <h4>Weather (5-day summary)</h4>

            <table>
                <tr>
                    <th></th>
                    <th id="d1"></th>
                    <th id="d2"></th>
                    <th id="d3"></th>
                    <th id="d4"></th>
                    <th id="d5"></th>
                </tr>

                <tr>
                    <td><b>Weather</b></td>
                    <td id="w1"></td>
                    <td id="w2"></td>
                    <td id="w3"></td>
                    <td id="w4"></td>
                    <td id="w5"></td>
                </tr>

                <tr>
                    <td><b>Spray</b></td>
                    <td id="s1"></td>
                    <td id="s2"></td>
                    <td id="s3"></td>
                    <td id="s4"></td>
                    <td id="s5"></td>
                </tr>

                <tr>
                    <td><b>Drying</b></td>
                    <td id="dr1"></td>
                    <td id="dr2"></td>
                    <td id="dr3"></td>
                    <td id="dr4"></td>
                    <td id="dr5"></td>
                </tr>
            </table>
        </div>

        <!-- INTELLIGENT ADVISORY -->
        <div id="advisory-box" class="advisory-box"></div>

    </div>

</div>

<script>

// LOCATION
const LAT = 17.3850;
const LON = 78.4867;

// FETCH WEATHER
async function getWeather() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max&timezone=auto`;
    const res = await fetch(url);
    return await res.json();
}

// WEATHER TEXT
function weatherText(code) {
    if (code < 3) return "☀️ Sunny";
    if (code < 50) return "⛅ Cloudy";
    if (code < 70) return "🌧 Rain";
    return "⛈ Storm";
}

// SPRAY LOGIC
function sprayLogic(code) {
    if (code >= 60) return ["No", "red-text"];
    if (code >= 45) return ["Monitor", "orange-text"];
    return ["OK", "green-text"];
}

// ✅ FIXED DRYING LOGIC (RAIN PRIORITY)
function dryingLogic(temp, code) {

    // rain cancels drying ALWAYS
    if (code >= 60) return ["No Drying", "red-text"];

    if (temp > 35) return ["Perfect", "green-text"];
    if (temp > 25) return ["Slow", "orange-text"];

    return ["Poor", ""];
}

// UPDATE UI
function updateUI(data) {

    const days = data.daily.time;
    const codes = data.daily.weathercode;
    const temps = data.daily.temperature_2m_max;

    for (let i = 0; i < 5; i++) {

        // DATE
        document.getElementById("d"+(i+1)).innerText =
            new Date(days[i]).toLocaleDateString("en-GB", { day: "numeric", month: "short" });

        // WEATHER
        let wEl = document.getElementById("w"+(i+1));
        wEl.innerText = weatherText(codes[i]);

        // highlight rain visually
        if (codes[i] >= 60) {
            wEl.style.color = "red";
            wEl.style.fontWeight = "bold";
        }

        // SPRAY
        let [spray, sc] = sprayLogic(codes[i]);
        let sEl = document.getElementById("s"+(i+1));
        sEl.innerText = spray;
        sEl.className = sc;

        // DRYING
        let [dry, dc] = dryingLogic(temps[i], codes[i]);
        let dEl = document.getElementById("dr"+(i+1));
        dEl.innerText = dry;
        dEl.className = dc;
    }
}

// INTELLIGENT ADVISORY
function generateAdvisory(data) {

    const codes = data.daily.weathercode;
    const temps = data.daily.temperature_2m_max;
    const days = data.daily.time;

    let rainDays = [];

    for (let i = 0; i < 5; i++) {
        if (codes[i] >= 60) rainDays.push(i);
    }

    let msg = "";

    if (rainDays.length >= 2) {
        msg += `🚨 CRITICAL ALERT\n`;
        msg += `Rain from ${format(days[rainDays[0]])} → ${format(days[rainDays.at(-1)])}\n\n`;
        msg += `❌ Stop spraying immediately\n`;
        msg += `✅ Resume after rain window\n`;
    }
    else if (rainDays.length === 1) {
        msg += `⚠ Rain expected on ${format(days[rainDays[0]])}\n`;
        msg += `👉 Avoid spraying that day\n`;
    }
    else {
        msg += `✅ SAFE CONDITIONS\n`;
        msg += `👉 Ideal spray window available\n`;
    }

    if (Math.max(...temps) > 38) {
        msg += `\n🔥 HIGH HEAT ALERT\nSpray early morning/evening`;
    }

    return msg;
}

function format(d) {
    return new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

// INIT
(async function () {
    const data = await getWeather();
    updateUI(data);
    document.getElementById("advisory-box").innerText = generateAdvisory(data);
})();

</script>

</body>
</html>
