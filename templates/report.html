<!DOCTYPE html>
<html>
<head>
    <title>Shet Mitra - Decision Engine</title>
</head>
<body>

<h1>🚜 Shet Mitra</h1>

<h2 id="decision">Loading...</h2>
<p id="reason"></p>
<p id="mandi"></p>
<p id="gain"></p>

<script>
async function loadDecision() {
    try {
        const res = await fetch("/decision");
        const data = await res.json();

        document.getElementById("decision").innerText =
            "🧠 Recommendation: " + data.decision;

        document.getElementById("reason").innerText =
            "💡 " + data.reason;

        document.getElementById("mandi").innerText =
            "📍 Best Mandi: " + data.best_mandi;

        document.getElementById("gain").innerText =
            "💰 Gain: ₹" + data.mandi_diff + " per quintal";

    } catch (err) {
        document.getElementById("decision").innerText = "Error loading data";
    }
}

loadDecision();
</script>

</body>
</html>
