<!DOCTYPE html>
<html>
<head>
<title>Shet Mitra v2</title>

<style>
body { font-family: Arial; background:#f4f4f4; }

.container {
    width:420px;
    margin:auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.header {
    background:#1b5e20;
    color:white;
    padding:15px;
    text-align:center;
}

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:4px;
    padding:15px;
}

.box { height:60px; border-radius:5px; }

.green{background:#2e7d32;}
.lightgreen{background:#66bb6a;}
.yellow{background:#fdd835;}
.orange{background:#fb8c00;}
.red{background:#e53935;}

.legend {
    background:#f1f1f1;
    padding:10px;
    margin:10px;
    border-radius:8px;
    font-size:12px;
}

.weather-box {
    background:#a7c7e7;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

table {
    width:100%;
    text-align:center;
    font-size:13px;
}

.ok { color:green; font-weight:bold; }
.no { color:red; font-weight:bold; }
.warn { color:orange; font-weight:bold; }

.rain-col { background:#ffe5e5; }

.alert-box {
    background:#ffebee;
    border-left:6px solid red;
    margin:10px;
    padding:12px;
    font-weight:bold;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h3>Shet Mitra v2</h3>
<p>2 Apr 2026</p>
</div>

<div class="grid">
<div class="box green"></div>
<div class="box lightgreen"></div>
<div class="box green"></div>
<div class="box lightgreen"></div>

<div class="box lightgreen"></div>
<div class="box orange"></div>
<div class="box yellow"></div>
<div class="box green"></div>

<div class="box lightgreen"></div>
<div class="box red"></div>
<div class="box orange"></div>
<div class="box green"></div>

<div class="box green"></div>
<div class="box yellow"></div>
<div class="box lightgreen"></div>
<div class="box green"></div>
</div>

<div class="legend">
🟢 Healthy | 🟡 Monitor | 🟠 Moderate | 🔴 Critical
</div>

<div class="weather-box">
<h4>Weather (5-day)</h4>

<table>
<tr>
<th></th><th>2 Apr</th><th>3 Apr</th><th>4 Apr</th><th>5 Apr</th><th>6 Apr</th>
</tr>

<tr>
<td><b>Weather</b></td>
<td>☀️</td><td>⛅</td><td>🌧</td><td>🌧</td><td>☀️</td>
</tr>

<tr>
<td><b>Spray</b></td>
<td class="ok">OK</td>
<td class="ok">OK</td>
<td class="no">NO</td>
<td class="no">NO</td>
<td class="ok">OK</td>
</tr>

<tr>
<td><b>Drying</b></td>
<td class="ok">Perfect</td>
<td class="ok">Perfect</td>
<td class="no">NO</td>
<td class="no">NO</td>
<td class="ok">Perfect</td>
</tr>

</table>
</div>

<div class="alert-box">
🚨 HEAVY RAIN WINDOW  
4 Apr → 5 Apr  

STOP spraying  
Resume after rain
</div>

</div>

</body>
</html>
