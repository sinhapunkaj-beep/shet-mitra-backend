<!DOCTYPE html>
<html>
<head>
<title>Shet Mitra</title>

<style>
body { font-family: Arial; background:#f4f4f4; }

.container {
    width:420px;
    margin:auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.header {
    background:#1b5e20;
    color:white;
    padding:15px;
    text-align:center;
}

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:4px;
    padding:15px;
}

.box { height:60px; border-radius:5px; }

.green{background:#2e7d32;}
.lightgreen{background:#66bb6a;}
.yellow{background:#fdd835;}
.orange{background:#fb8c00;}
.red{background:#e53935;}

.legend {
    background:#f1f1f1;
    padding:10px;
    margin:10px;
    border-radius:8px;
    font-size:12px;
}

.weather-box {
    background:#a7c7e7;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

table {
    width:100%;
    text-align:center;
    font-size:13px;
}

/* 🔥 STRONG VISUAL COLORS */
.ok { color:green; font-weight:bold; }
.no { color:red; font-weight:bold; }
.warn { color:orange; font-weight:bold; }

/* 🔥 RAIN COLUMN HIGHLIGHT */
.rain-col {
    background:#ffe5e5;
}

/* 🔥 BIG ALERT BOX */
.alert-box {
    background:#ffebee;
    border-left:6px solid red;
    margin:10px;
    padding:12px;
    font-weight:bold;
    white-space:pre-line;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h3>Shet Mitra</h3>
<p>{{date}}</p>
</div>

<div class="grid">
{% for row in grid %}
{% for cell in row %}
<div class="box {{cell}}"></div>
{% endfor %}
{% endfor %}
</div>

<div class="legend">
🟢 Healthy | 🟡 Monitor | 🟠 Moderate | 🔴 Critical
</div>

<div class="weather-box">
<h4>Weather (5-day)</h4>

<table>
<tr>
<th></th>
<th id="d1"></th>
<th id="d2"></th>
<th id="d3"></th>
<th id="d4"></th>
<th id="d5"></th>
</tr>

<tr>
<td><b>Weather</b></td>
<td id="w1"></td>
<td id="w2"></td>
<td id="w3"></td>
<td id="w4"></td>
<td id="w5"></td>
</tr>

<tr>
<td><b>Spray</b></td>
<td id="s1"></td>
<td id="s2"></td>
<td id="s3"></td>
<td id="s4"></td>
<td id="s5"></td>
</tr>

<tr>
<td><b>Drying</b></td>
<td id="dr1"></td>
<td id="dr2"></td>
<td id="dr3"></td>
<td id="dr4"></td>
<td id="dr5"></td>
</tr>
</table>
</div>

<div id="alert" class="alert-box"></div>

</div>

<script>

// LOCATION
const LAT=17.385;
const LON=78.486;

// FETCH
async function getWeather(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max&timezone=auto`);
return await r.json();
}

// WEATHER TEXT
function wt(c){
if(c<3) return "☀️";
if(c<50) return "⛅";
if(c<70) return "🌧";
return "⛈";
}

// LOGIC
function spray(c){
if(c>=60) return ["NO","no"];
if(c>=45) return ["Monitor","warn"];
return ["OK","ok"];
}

function drying(t,c){
if(c>=60) return ["NO","no"]; // FIXED
if(t>35) return ["Perfect","ok"];
if(t>25) return ["Slow","warn"];
return ["Poor",""];
}

// UI
function update(d){

let codes=d.daily.weathercode;
let temps=d.daily.temperature_2m_max;
let days=d.daily.time;

for(let i=0;i<5;i++){

document.getElementById("d"+(i+1)).innerText=
new Date(days[i]).toLocaleDateString("en-GB",{day:"numeric",month:"short"});

// weather
let w=document.getElementById("w"+(i+1));
w.innerText=wt(codes[i]);

// 🔥 highlight rain column
if(codes[i]>=60){
w.parentElement.children[i+1].classList.add("rain-col");
}

// spray
let [s,sc]=spray(codes[i]);
let se=document.getElementById("s"+(i+1));
se.innerText=s;
se.className=sc;

// drying
let [dr,dc]=drying(temps[i],codes[i]);
let dre=document.getElementById("dr"+(i+1));
dre.innerText=dr;
dre.className=dc;
}
}

// ALERT ENGINE
function advisory(d){

let codes=d.daily.weathercode;
let days=d.daily.time;

let rain=codes.map((c,i)=>c>=60?i:null).filter(x=>x!==null);

if(rain.length>=2){
return `🚨 HEAVY RAIN WINDOW\n${fmt(days[rain[0]])} → ${fmt(days[rain.at(-1)])}\n\nSTOP spraying\nResume after rain`;
}

if(rain.length==1){
return `⚠ Rain on ${fmt(days[rain[0]])}\nAvoid spraying`;
}

return `✅ Safe spray window`;
}

function fmt(d){
return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}

// INIT
(async()=>{
let data=await getWeather();
update(data);
document.getElementById("alert").innerText=advisory(data);
})();

</script>

</body>
</html>
